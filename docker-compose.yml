version: "3.8"

services:
  wiki:
    image: ghcr.io/arthurvaladaresufla/gcc125-tf-wiki:latest
    container_name: wiki
    restart: always
    expose:
      - "5000"
    volumes:
      - "/var/www/wiki:/app/data"

  nginx:
    image: nginx:alpine
    container_name: wiki-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wiki
