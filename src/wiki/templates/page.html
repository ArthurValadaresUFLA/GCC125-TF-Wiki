{% extends "base.html" %}

{% block title %}

{% endblock %}

{% block content %}

        <a href="/">Início</a>
        <a href="/{{ page.name }}/pdf">Exportar PDF</a>

</div>

<article class="markdown-body">
    {{ content|safe }}
</article>
{% endblock %}
